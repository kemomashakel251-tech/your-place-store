<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إتمام الطلب - yourplace_مكانك</title>
<link rel="stylesheet" href="style.css">

<!-- Facebook Pixel Code (initialized later with the ID saved in store settings) -->
<script>
  !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
  n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
  document,'script','https://connect.facebook.net/en_US/fbevents.js');
</script>

<!-- TikTok Pixel Code (initialized later with the ID saved in store settings) -->
<script>
  !function (w, d, t) {
    w.TMTK = w.TMTK || [];
    var ttq = w.TMTK;
    ttq.methods = ["page","track","identify"];
    ttq.setAndDefer = function(target, method){ target[method] = function(){ target.push([method].concat(Array.prototype.slice.call(arguments,0))); }; };
    for (var i = 0; i < ttq.methods.length; i++) { ttq.setAndDefer(ttq, ttq.methods[i]); }
    ttq.load = function(sdkid) {
      var s = d.createElement(t); s.async = !0; s.src = "https://analytics.tiktok.com/i18n/pixel/events.js?sdkid=" + sdkid;
      var a = d.getElementsByTagName(t)[0]; a.parentNode.insertBefore(s, a);
    };
  }(window, document, "script");
</script>
</head>
<body>
<div id="toast"></div>
<a id="waFloat" class="float" target="_blank">💬</a>

<button id="botFloat" class="bot-float" onclick="toggleBotPanel()" title="مساعد المتجر">🤖<span class="bot-badge" id="botBadge"></span></button>
<div class="bot-panel" id="botPanel">
  <div class="bot-header">
    <b>🤖 مساعد <span id="botStoreName">المتجر</span></b>
    <button class="btn small gray" style="margin:0;padding:4px 10px" onclick="toggleBotPanel()">X</button>
  </div>
  <div class="bot-messages" id="botMessages"></div>
  <div class="bot-quick" id="botQuick"></div>
  <div class="bot-input-row">
    <input id="botInput" placeholder="اكتب سؤالك..." onkeydown="if(event.key==='Enter')sendBotMsg()">
    <button class="btn small" onclick="sendBotMsg()">إرسال</button>
  </div>
</div>

<div id="shipPolicyOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9998;align-items:center;justify-content:center;padding:20px">
  <div style="background:#fff;border-radius:16px;padding:22px;max-width:500px;width:100%;max-height:80vh;overflow:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h3 style="margin:0">📦 سياسة الشحن</h3>
      <button class="btn small gray" onclick="hideShipPolicy()">X</button>
    </div>
    <div id="shipPolicyText" style="white-space:pre-line;line-height:1.8;color:#333"></div>
  </div>
</div>

<header>
  <div class="container" style="display:flex;justify-content:space-between;align-items:center;width:100%;padding:0">
    <a href="index.html" style="text-decoration:none;color:inherit"><h2 id="sName">yourplace_مكانك</h2></a>
    <nav>
      <button class="btn small gray" onclick="toggleLang()" id="langBtn" style="margin:0; font-size:13px">EN</button>
      <a href="index.html"><span data-key="nav_store">المتجر</span></a>
      <a onclick="cartToggle()" style="cursor:pointer"><span data-key="nav_cart">السلة</span> 🛒 <b class="cart-badge">0</b></a>
    </nav>
  </div>
</header>

<div class="container">
  <div class="box">
    <h3 data-key="checkout_title">اتمام الطلب</h3>
    <div id="checkList"></div>
    <hr>
    <h3 data-key="shipping_info">بيانات الشحن</h3>
    <input id="cn" placeholder="الاسم">
    <input id="cp" placeholder="الموبايل" inputmode="tel">
    <input id="cp2" placeholder="رقم هاتف تاني (اختياري)" inputmode="tel" style="display:none">
    <select id="cg"></select>
    <textarea id="ca" placeholder="العنوان" rows="2"></textarea>
    <div id="cpBox" class="coupon-box" style="display:none">
      <input id="coupon" placeholder="كود الكوبون">
      <button class="btn gray" style="width:auto" onclick="applyCoupon()" data-key="apply_btn">تطبيق</button>
    </div>
    <div id="sum"></div>
    <button type="button" id="shipPolicyBtn" class="btn gray" style="display:none;background:#eef3ff" onclick="showShipPolicy()">📦 سياسة الشحن</button>
    <div id="vodafoneBox" style="display:none; background:#fff3cd; border:1px solid #ffe69c; border-radius:12px; padding:16px; margin:14px 0;">
      <h4 style="margin:0 0 8px;color:#856404">💜 الدفع عن طريق فودافون كاش</h4>
      <p style="margin:0 0 10px">حوّل قيمة الطلب على الرقم: <b id="vfNumberDisplay" style="font-size:18px;color:var(--main)"></b></p>
      <label>ارفق صورة (اسكرين شوت) من التحويل (اختياري)</label>
      <input id="vfScreenshot" type="file" accept="image/*">
      <div id="vfPreview" style="margin-top:8px"></div>
    </div>
    <button class="btn green" onclick="finish()" data-key="confirm_order">تأكيد الطلب</button>
    <a href="index.html" class="btn gray" data-key="cancel_btn">الغاء</a>
  </div>
</div>

<div id="cart">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h4 style="margin:0" data-key="nav_cart">سلة المشتريات</h4>
    <button class="btn small gray" onclick="cartToggle()">X</button>
  </div>
  <div id="cItems">فاضية</div>
  <hr>
  <p style="font-size:16px"><span data-key="count_lbl">العدد</span>: <b class="cart-badge">0</b></p>
  <button class="btn" onclick="cartToggle()" data-key="checkout_title">اتمام الطلب</button>
</div>

<script src="shared.js"></script>
<script>
let LAST={};
let CHK_OPTS={};
let COUPON=0;
let VF_SCREENSHOT = null;

function setDist(id,type,key,val){
  let opt = CHK_OPTS[id]; let totalQty = CART[id]; val = +val || 0; opt[type][key] = val;
  let sum = Object.values(opt[type]).reduce((a,b)=>a+b,0);

  if(sum > totalQty){
      toast('المجموع ماينفعش يزيد عن '+totalQty);
      opt[type][key] = totalQty - (sum - val);
      val = opt[type][key];
      sum = totalQty;
      let currentInput = document.querySelector(`#${type}-${id} input[oninput*="'${key}'"]`);
      if(currentInput) currentInput.value = val;
  }

  let container = document.getElementById(type + '-' + id);
  if(container) {
      container.querySelectorAll('input').forEach(input => {
        let inputVal = +input.value || 0;
        if (sum >= totalQty && inputVal === 0) {
          input.disabled = true;
          input.style.backgroundColor = "#e9ecef";
        } else {
          input.disabled = false;
          input.style.backgroundColor = "#fff";
        }
      });
  }
  calc();
}

function calc(){
  let sub=0, bulkSave=0;
  Object.keys(CART).forEach(id=>{
    let p=PROD.find(x=>x.id==id); if(!p) return;
    let qty = CART[id]; let normalPrice = p.disc && p.disc < p.v? p.disc : p.v; let itemPrice = getPrice(p, qty); let itemTotal = itemPrice * qty; let normalTotal = normalPrice * qty;
    if(p.bulk_on && qty >= p.bulk_qty){ bulkSave += normalTotal - itemTotal; }
    sub += itemTotal;
  });
  let cgEl = document.getElementById('cg');
  let ship=+cgEl.value||0; let discountAmount = sub * (COUPON / 100);
  LAST={sub,ship,tot:sub+ship-discountAmount, bulkSave: bulkSave};
  document.getElementById('sum').innerHTML=`<hr><table style="background:transparent;width:100%">
    <tr><td>المنتجات</td><td><b>${sub.toFixed(1)}</b></td></tr>
    ${bulkSave>0?`<tr><td style="color:#22c55e">خصم الكمية</td><td style="color:#22c55e"><b>-${bulkSave.toFixed(1)}</b></td></tr>`:''}
    <tr><td>الشحن</td><td><b>${ship}</b></td></tr>
    ${COUPON>0?`<tr><td>خصم الكوبون</td><td style="color:var(--green)">-%${COUPON} (-${discountAmount.toFixed(1)})</td></tr>`:''}
    <tr><td><b>الإجمالي</b></td><td><b style="color:var(--main);font-size:20px">${LAST.tot.toFixed(1)} جنيه</b></td></tr></table>`;
}

function applyCoupon(){
  let coupon = document.getElementById('coupon');
  if(coupon.value==SET.cpCode){COUPON=+SET.cpVal;toast(`%${COUPON} OK`)}else{COUPON=0;toast('Error')};calc()
}

async function finish(){
  // استنى Firebase يكون جاهز (لحد 8 ثواني)
  let waited = 0;
  while(!window.db && waited < 80){ await new Promise(r=>setTimeout(r,100)); waited++; }
  if(!window.db) return toast('خطأ في الاتصال، حاول تاني');

  let cn=document.getElementById('cn'), cp=document.getElementById('cp'), ca=document.getElementById('ca'), cg=document.getElementById('cg');
  if(!cn.value) return toast('من فضلك اكتب الاسم');
  if(!cp.value) return toast('من فضلك اكتب الموبايل');
  if(!ca.value) return toast('من فضلك اكتب العنوان');
  if(!cg.value) return toast('من فضلك اختار المحافظة');

  let btn = document.querySelector('button.btn.green');
  if(btn){ btn.disabled=true; btn.innerText='جاري الإرسال...'; }

  try {
    let items=[];
    for(let id in CART){
      let p=PROD.find(x=>x.id==id);
      if(!p){ toast('منتج في السلة غير موجود، أعد المحاولة'); if(btn){btn.disabled=false;btn.innerText='تأكيد الطلب';} return; }
      let opt=CHK_OPTS[id]; let price = getPrice(p, CART[id]);
      let sizeSum = Object.values(opt.sizes).reduce((a,b)=>a+b,0);
      let colorSum = Object.values(opt.colors).reduce((a,b)=>a+b,0);
      let customSum = Object.values(opt.custom||{}).reduce((a,b)=>a+b,0);
      if(p.sz && p.sz.length && sizeSum != CART[id]) { toast(`مجموع المقاسات لازم يساوي ${CART[id]} للمنتج ${p.n}`); if(btn){btn.disabled=false;btn.innerText='تأكيد الطلب';} return; }
      if(p.cl && p.cl.length && colorSum != CART[id]) { toast(`مجموع الالوان لازم يساوي ${CART[id]} للمنتج ${p.n}`); if(btn){btn.disabled=false;btn.innerText='تأكيد الطلب';} return; }
      if(p.customVariants && p.customVariants.length && customSum != CART[id]) { toast(`مجموع ${p.customVariants[0].name} لازم يساوي ${CART[id]} للمنتج ${p.n}`); if(btn){btn.disabled=false;btn.innerText='تأكيد الطلب';} return; }
      if(CART[id]>p.stock){ toast(`${i18n[LANG].max_stock} ${p.stock}`); if(btn){btn.disabled=false;btn.innerText='تأكيد الطلب';} return; }
      items.push({id:id,n:p.n,d:p.d||'',v:price,q:CART[id],cost:p.cost||0,sizes:opt.sizes,colors:opt.colors,custom:opt.custom||{}});
    }

    let newOrder = { id:Date.now(), date:new Date().toLocaleString('ar-EG'), items, subtotal:LAST.sub, bulkDiscount:LAST.bulkSave||0, coupon:LAST.sub*(COUPON/100), ship:LAST.ship, tot:LAST.tot, st:'new', c:{n:cn.value,p:cp.value,p2:(SET.altPhoneOn?document.getElementById('cp2').value:''),a:ca.value,g:cg.options[cg.selectedIndex].text}};
    if(SET.vodafoneOn && VF_SCREENSHOT){ newOrder.paymentMethod='vodafone'; newOrder.paymentScreenshot=VF_SCREENSHOT; }
    if(typeof fbq !== 'undefined' && SET.fbPixelId){ fbq('track','Purchase',{value:LAST.tot,currency:'EGP'}); }
    if(typeof TMTK !== 'undefined' && SET.tiktokPixelId){ TMTK.push(['track','CompletePayment',{value:LAST.tot,currency:'EGP'}]); }

    await window.saveOrderToCloud(newOrder);
    CART={};CHK_OPTS={};COUPON=0;VF_SCREENSHOT=null;saveCart();
    toast('تم الطلب بنجاح ✅');
    setTimeout(()=>{ window.location.href='index.html'; }, 1500);
  } catch(e) {
    console.error('Order error:', e);
    toast('خطأ: ' + (e.message || e.code || e));
    if(btn){ btn.disabled=false; btn.innerText='تأكيد الطلب'; }
  }
}

function renderCheckout(){
  if(!Object.keys(CART).length){
    document.querySelector('.container .box').innerHTML = `<p style="text-align:center;color:var(--muted)">السلة فاضية</p><a href="index.html" class="btn">الرجوع للمتجر</a>`;
    return;
  }

  let noteHtml = SET.clientNote? `<div style='background:#e7f1ff;border:1px solid #b3d4fc;padding:12px;text-align:center;font-weight:600;color:#084298;margin-bottom:15px;border-radius:8px'>📢 ${SET.clientNote}</div>` : '';

  let countDownHtml = '';
  if(SET.countDownOn) {
     countDownHtml = `<div style='background:#fff3cd; color:#856404; padding:12px; text-align:center; font-weight:bold; margin-bottom:15px; border-radius:8px;'>
        <div style="margin-bottom:5px;">⏰ ${SET.countDownText}</div>
        <div class="dynamic-timer-box">
          <div><div class="timer-segment" id="chkHours">00</div><div class="timer-label">ساعة</div></div>
          <div><div class="timer-segment" id="chkMins">00</div><div class="timer-label">دقيقة</div></div>
          <div><div class="timer-segment" id="chkSecs">00</div><div class="timer-label">ثانية</div></div>
        </div>
     </div>`;
  }

  document.getElementById('checkList').innerHTML = noteHtml + countDownHtml + Object.keys(CART).map(id=>{
    let p=PROD.find(x=>x.id==id); if(!p) return '';
    if(!CHK_OPTS[id])CHK_OPTS[id]={q:CART[id],sizes:{},colors:{},custom:{}};
    if(!CHK_OPTS[id].custom) CHK_OPTS[id].custom = {};
    let opt = CHK_OPTS[id]; let totalQty = CART[id]; let price = getPrice(p, totalQty);

    let sizeSum = Object.values(opt.sizes).reduce((a,b)=>a+b,0);
    let colorSum = Object.values(opt.colors).reduce((a,b)=>a+b,0);
    let customSum = Object.values(opt.custom).reduce((a,b)=>a+b,0);
    if(sizeSum==0 && p.sz && p.sz.length) opt.sizes[p.sz[0]] = totalQty;
    if(colorSum==0 && p.cl && p.cl.length) opt.colors[p.cl[0]] = totalQty;
    if(customSum==0 && p.customVariants && p.customVariants.length) opt.custom[p.customVariants[0].name] = totalQty;
    sizeSum = Object.values(opt.sizes).reduce((a,b)=>a+b,0);
    colorSum = Object.values(opt.colors).reduce((a,b)=>a+b,0);
    customSum = Object.values(opt.custom).reduce((a,b)=>a+b,0);

    let sizeHtml = p.sz && p.sz.length? `<div id="sizes-${id}" style="margin-top:10px;"><b>المقاسات:</b><br>`+ p.sz.map(s=>{
      let val = opt.sizes[s]||0; let isDisabled = (sizeSum >= totalQty) && val == 0; let bg = isDisabled ? '#e9ecef' : '#fff';
      return `<div style="display:flex;align-items:center;gap:8px;margin:4px 0"><span>${s}:</span><input type="number" min="0" max="${totalQty}" value="${val}" ${isDisabled?'disabled':''} style="width:70px;padding:6px;background-color:${bg};" oninput="setDist('${id}','sizes','${s}',this.value)"></div>`
    }).join('')+`</div>` : '';

    let colorHtml = p.cl && p.cl.length? `<div id="colors-${id}" style="margin-top:10px;"><b>الألوان:</b><br>`+ p.cl.map(c=>{
      let val = opt.colors[c]||0; let isDisabled = (colorSum >= totalQty) && val == 0; let bg = isDisabled ? '#e9ecef' : '#fff';
      return `<div style="display:flex;align-items:center;gap:8px;margin:4px 0"><span>${c}:</span><input type="number" min="0" max="${totalQty}" value="${val}" ${isDisabled?'disabled':''} style="width:70px;padding:6px;background-color:${bg};" oninput="setDist('${id}','colors','${c}',this.value)"></div>`
    }).join('')+`</div>` : '';

    let customHtml = p.customVariants && p.customVariants.length? `<div id="custom-${id}" style="margin-top:10px;">`+ p.customVariants.map(cv=>{
      let val = opt.custom[cv.name]||0; let isDisabled = (customSum >= totalQty) && val == 0; let bg = isDisabled ? '#e9ecef' : '#fff';
      return `<div><b>${cv.name}:</b><br><div style="display:flex;align-items:center;gap:8px;margin:4px 0"><input type="number" min="0" max="${totalQty}" value="${val}" ${isDisabled?'disabled':''} style="width:70px;padding:6px;background-color:${bg};" oninput="setDist('${id}','custom','${cv.name}',this.value)"></div></div>`
    }).join('')+`</div>` : '';

    let descriptionHtml = p.d ? `<p style="color:var(--muted); font-size:14px; margin: 8px 0; white-space: pre-line;">${p.d}</p>` : '';

    let checkMediaList = p.media && p.media.length ? p.media : [{type:'image', src:'https://via.placeholder.com/200'}];
    let checkMediaHtml = checkMediaList.length > 1
      ? `<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px">${checkMediaList.map(m => m.type==='video'
          ? `<video src="${m.src}" muted controls style="width:90px;height:90px;object-fit:cover;border-radius:10px;flex:0 0 auto"></video>`
          : `<img src="${m.src}" style="width:90px;height:90px;object-fit:cover;border-radius:10px;flex:0 0 auto">`).join('')}</div>`
      : (checkMediaList[0].type==='video'
          ? `<video src="${checkMediaList[0].src}" controls muted></video>`
          : `<img src="${checkMediaList[0].src}">`);

    return `<div class="check-prod" id="chk${id}">
      <div style="display:flex; gap:12px; align-items:center;">
        <img src="${p.media && p.media[0]? p.media[0].src : 'https://via.placeholder.com/200'}" style="width:70px;height:70px;object-fit:cover;border-radius:8px">
        <div>
          <h3 style="margin:0 0 4px 0;">${p.n}</h3>
          <div style="display:flex; align-items:center; gap:10px; margin-top:8px;">
            <h4 style="margin:0; color:var(--muted)">الكمية:</h4>
            <button class="btn small gray" style="margin:0; padding:4px 10px;" onclick="updateCheckoutQty('${id}', -1)">-</button>
            <b style="font-size:18px;">${totalQty}</b>
            <button class="btn small gray" style="margin:0; padding:4px 10px;" onclick="updateCheckoutQty('${id}', 1)">+</button>
          </div>
        </div>
      </div>
      ${checkMediaHtml}
      ${descriptionHtml}
      ${sizeHtml}
      ${colorHtml}
      ${customHtml}
      <h3 style="color:var(--main); margin-top:12px;">السعر: ${price*totalQty} جنيه</h3>
    </div>`
  }).join('');

  let cg = document.getElementById('cg');
  cg.innerHTML=`<option value="">اختار المحافظة</option>`+SET.gov.map(g=>`<option value="${g.v}">${g.n} - ${g.v} جنيه</option>`).join('');
  cg.onchange=calc;
  COUPON=0; document.getElementById('coupon').value=''; document.getElementById('cpBox').style.display=SET.cpOn?'flex':'none'; calc();

  document.getElementById('shipPolicyBtn').style.display = (SET.shippingPolicyOn && SET.shippingPolicyText) ? 'block' : 'none';
  document.getElementById('cp2').style.display = SET.altPhoneOn ? 'block' : 'none';

  VF_SCREENSHOT = null;
  let vfBox = document.getElementById('vodafoneBox');
  if(SET.vodafoneOn && SET.vodafoneNumber){
    vfBox.style.display='block';
    document.getElementById('vfNumberDisplay').innerText = SET.vodafoneNumber;
    document.getElementById('vfPreview').innerHTML='';
    document.getElementById('vfScreenshot').value='';
  } else {
    vfBox.style.display='none';
  }

  if(SET.countDownOn) { startDynamicTimer('chkHours', 'chkMins', 'chkSecs'); }
}

window.updateCheckoutQty = function(id, d) {
    let p = PROD.find(x => x.id == id);
    if(!p) return;
    let newQ = (CART[id] || 0) + d;
    if (newQ < 1) {
        if(confirm('هل تريد حذف المنتج من السلة؟')) {
            delete CART[id]; delete CHK_OPTS[id]; saveCart(); updateCartBadge();
            if(Object.keys(CART).length === 0){ window.location.href = 'index.html'; return; }
            return renderCheckout();
        }
        return;
    }
    let max = p.maxQty || 999;
    if (newQ > max) return toast(`اقصى عدد من ${p.n} هو ${max} قطعة`);
    if (newQ > p.stock) return toast(`المخزون الكلي المتاح فقط: ${p.stock}`);
    CART[id] = newQ;
    if(CHK_OPTS[id]) CHK_OPTS[id].q = newQ;
    saveCart(); updateCartBadge();
    renderCheckout();
}

document.getElementById('vfScreenshot').addEventListener('change', function(e){
  let file = e.target.files[0];
  if(!file) return;
  let reader = new FileReader();
  reader.onload = function(ev){
    let img = new Image();
    img.onload = function(){
      let canvas = document.createElement('canvas');
      let max_size = 900;
      let width = img.width, height = img.height;
      if(width > height){ if(width > max_size){ height *= max_size/width; width = max_size; } }
      else { if(height > max_size){ width *= max_size/height; height = max_size; } }
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      VF_SCREENSHOT = canvas.toDataURL('image/jpeg', 0.7);
      document.getElementById('vfPreview').innerHTML = `<img src="${VF_SCREENSHOT}" style="width:100px;height:100px;object-fit:cover;border-radius:8px">`;
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

window.onSettingsLoaded = function(){ if(PROD.length) renderCheckout(); };
window.onProductsLoaded = function(){ renderCheckout(); };
window.onLangChange = function(){ renderCheckout(); };
window.onCartChange = function(){};

updateCartBadge();
renderCartDrawer();
updateLangDOM();
initApp();
</script>
</body>
</html>
